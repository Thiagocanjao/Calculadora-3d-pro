<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora 3D Pro</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent: #4a90e2;
            --text-color: #444;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container 3D com perspectiva */
        .calculator {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), 
                       -20px -20px 60px var(--shadow-light);
            width: 100%;
            max-width: 350px;
            margin: 15px;
        }

        #display {
            width: 100%;
            height: 60px;
            background: var(--bg-color);
            border: none;
            border-radius: 10px;
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            margin-bottom: 25px;
            text-align: right;
            padding: 0 15px;
            font-size: 24px;
            color: var(--text-color);
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 15px;
            background: var(--bg-color);
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                        -6px -6px 12px var(--shadow-light);
            font-size: 18px;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efeito de clique (Botão afunda) */
        button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .operator {
            color: var(--accent);
        }

        .equal {
            grid-column: span 2;
            aspect-ratio: auto;
            background: var(--accent);
            color: white;
            box-shadow: 6px 6px 12px #b8c1cc, 
                        -6px -6px 12px #ffffff;
        }

        .equal:active {
            background: #357abd;
        }

        /* Responsividade para telas muito pequenas */
        @media (max-width: 320px) {
            .buttons { gap: 10px; }
            .calculator { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button onclick="clearDisplay()" class="operator">C</button>
        <button onclick="deleteLast()" class="operator">DEL</button>
        <button onclick="appendToDisplay('/')" class="operator">÷</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2; aspect-ratio: auto;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        if (display.value === "0" || display.value === "Erro") {
            display.value = input;
        } else {
            display.value += input;
        }
    }

    function clearDisplay() {
        display.value = "0";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
        if (display.value === "") display.value = "0";
    }

    function calculate() {
        try {
            // Substitui os símbolos visuais por operadores reais de JS
            let result = eval(display.value);
            display.value = Number.isInteger(result) ? result : result.toFixed(2);
        } catch (error) {
            display.value = "Erro";
            setTimeout(clearDisplay, 1500);
        }
    }
</script>

</body>
</html>
